<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <style>
    @media (prefers-color-scheme: dark) {
      .bg { fill: #B2D8C6; }
      .letter { fill: #2D4A3E; }
    }
  </style>
  <rect class="bg" width="32" height="32" rx="8" fill="#2D4A3E"/>
  <text class="letter" x="50%" y="50%" text-anchor="middle" dominant-baseline="central" font-family="Georgia, 'Times New Roman', serif" font-size="20" font-weight="700" fill="#ffffff">L</text>
</svg>
